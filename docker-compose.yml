services:

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - garage
    volumes:
      - ./backend/logs:/app/logs
      - ./.chroma:/app/.chroma
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8501:8501"
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: garage
    restart: unless-stopped
    ports:
      - "3900:3900"   # S3 API
      - "3901:3901"   # RPC (internal cluster comms)
      - "3902:3902"   # S3 Web UI
    environment:
      - GARAGE_RPC_SECRET=${GARAGE_RPC_SECRET}
    volumes:
      - ./.garage/garage.toml:/etc/garage.toml
      - ./.garage/data:/var/lib/garage

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./.ollama:/root/.ollama
    restart: unless-stopped